---
# Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.1
          args: ["--config.file=/etc/prometheus/prometheus.yml",
                 "--storage.tsdb.retention.time=1h"]
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config; mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090; nodePort: 30090
  type: NodePort
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'astrasre-services'
        static_configs:
          - targets: ['payment:8000','order:8001','inventory:8002','frontend:8003','notification:8004']
---
# Loki
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
spec:
  replicas: 1
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports:
            - containerPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: loki
spec:
  selector: { app: loki }
  ports:
    - port: 3100
---
# Jaeger
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels: { app: jaeger }
  template:
    metadata:
      labels: { app: jaeger }
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.55
          env:
            - name: COLLECTOR_OTLP_ENABLED; value: "true"
          ports:
            - containerPort: 16686
            - containerPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector: { app: jaeger }
  ports:
    - name: ui;   port: 16686; nodePort: 30686
    - name: otlp; port: 4318
  type: NodePort
---
# Orchestrator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels: { app: orchestrator }
  template:
    metadata:
      labels: { app: orchestrator }
    spec:
      containers:
        - name: orchestrator
          image: astrasre/orchestrator:latest
          command: ["python", "orchestrator.py"]
          ports:
            - containerPort: 5010
          env:
            - name: LOKI_URL;        value: http://loki:3100
            - name: PROMETHEUS_URL;  value: http://prometheus:9090
            - name: OTLP_ENDPOINT;   value: http://jaeger:4318/v1/traces
            - name: PAYMENT_URL;     value: http://payment:5002
            - name: ORDER_URL;       value: http://order:5001
            - name: INVENTORY_URL;   value: http://inventory:5003
            - name: FRONTEND_URL;    value: http://frontend:5000
            - name: NOTIFICATION_URL; value: http://notification:5004
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  selector: { app: orchestrator }
  type: NodePort
  ports:
    - port: 5010; nodePort: 30010
