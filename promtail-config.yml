clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            log:    log
            stream: stream
            time:   time
      - json:
          source: log
          expressions:
            service: service
            level:   level
            message: message
      - labels:
          service: ""
          level:   ""
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: log
